<script>
    let isKeyVerified = false;
    const correctKey = 
"htios2590";
"htios2590";
    const keyOverlay = document.getElementById('keyOverlay');
    const keyInput = document.getElementById('keyInput');
    const btnKey = document.getElementById('btnKey');

    function checkKey() {
        if (keyInput.value.trim() === correctKey) {
            isKeyVerified = true;

        }
    }
    btnKey.onclick = checkKey;
    keyInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') checkKey(); });

    function toggleMenu(show) {
        if (!isKeyVerified) return;
        if (show) {
            menu.style.display = 'block';
            setTimeout(() => {
                menu.style.opacity = '1';
                menu.style.transform = 'scale(1)';

            openIcon.style.display = 'none';

            setTimeout(() => {
                menu.style.display = 'none';
                openIcon.style.display = 'flex';
            }, 300);
        }
    }

    openIcon.onclick = () => toggleMenu(true);
    document.getElementById('btnClose').onclick = () => toggleMenu(false);
    document.getElementById('btnHide').onclick = () => {
        menu.style.display = 'none';
        openIcon.style.display = 'none';
        setTimeout(() => {
            if(confirm("Menu đã ẩn hoàn toàn. Bạn có muốn hiện lại icon không?")) openIcon.style.display = 'flex';
        }, 800);
    };

    class MenuDraggable {
        constructor(element) {
            this.el = element;
            this.isDragging = false;
            this.startX = 0; this.startY = 0;
            this.initialLeft = 0; this.initialTop = 0;
            this.setupEvents();
        }
        setupEvents() {
            const onStart = (x, y, target) => {
                if(target.closest('.switch, .tab, .btn-footer, .social-card, .slider, .right, .key-input')) return;
                this.isDragging = true;
                this.startX = x; this.startY = y;
                const rect = this.el.getBoundingClientRect();
                this.initialLeft = rect.left; this.initialTop = rect.top;
                this.el.style.transition = 'none';
            };
            const onMove = (x, y) => {
                if(!this.isDragging) return;
                this.el.style.left = `${this.initialLeft + (x - this.startX)}px`;
                this.el.style.top = `${this.initialTop + (y - this.startY)}px`;
            };
            const onEnd = () => {
                this.isDragging = false;
                this.el.style.transition = 'all 0.4s cubic-bezier(0.19, 1, 0.22, 1)';
            };
            this.el.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY, e.target));
            document.addEventListener('touchmove', e => onMove(e.touches[0].clientX, e.touches[0].clientY));
            document.addEventListener('touchend', onEnd);
            this.el.addEventListener('mousedown', e => onStart(e.clientX, e.clientY, e.target));
            document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
            document.addEventListener('mouseup', onEnd);
        }
    }

    class FloatingButton {
        constructor(id, label, iconClass, switchEl) {
            this.id = id; this.label = label; this.iconClass = iconClass; this.switchEl = switchEl;
            this.element = null;
            this.x = window.innerWidth - 75;
            this.y = 120 + (document.querySelectorAll('.draggable-btn').length * 65);
            this.isDragging = false; this.hasMoved = false;
            this.switchEl.addEventListener('change', () => this.sync());
        }
        spawn() {
            if(this.element) return;
            this.element = document.createElement('div');
            this.element.className = 'draggable-btn active';
            this.element.style.display = 'flex';
            this.element.innerHTML = `<i class="${this.iconClass}"></i><span>${this.label}</span>`;
            this.element.style.left = `${this.x}px`; this.element.style.top = `${this.y}px`;
            document.body.appendChild(this.element);
            this.attachEvents();
        }
        remove() { if(this.element) { this.element.remove(); this.element = null; } }
        sync() { this.switchEl.checked ? this.spawn() : this.remove(); }
        toggle() {
            this.switchEl.checked = !this.switchEl.checked;
            this.element.classList.toggle('active', this.switchEl.checked);
        }
        attachEvents() {
            const onStart = (x, y) => {
                this.isDragging = true; this.hasMoved = false;
                this.startX = x; this.startY = y;
                this.element.style.transition = 'none';
            };
            const onMove = (x, y) => {
                if(!this.isDragging) return;
                if(Math.abs(x - this.startX) > 2 || Math.abs(y - this.startY) > 2) this.hasMoved = true;
                this.x += (x - this.startX); this.y += (y - this.startY);
                this.element.style.left = `${this.x}px`; this.element.style.top = `${this.y}px`;
                this.startX = x; this.startY = y;
            };
            const onEnd = () => {
                this.isDragging = false;
                this.element.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                if(!this.hasMoved) this.toggle();
            };
            this.element.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
            document.addEventListener('touchmove', e => { if(this.isDragging) onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
            this.element.addEventListener('touchend', onEnd);
            this.element.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX, e.clientY); });
            document.addEventListener('mousemove', e => { if(this.isDragging) onMove(e.clientX, e.clientY); });
            this.element.addEventListener('mouseup', () => { if(this.isDragging) onEnd(); });
        }
    }

    const cx = (window.innerWidth - 350) / 2;
    const cy = (window.innerHeight - 320) / 2;
    menu.style.left = `${cx}px`;
    menu.style.top = `${cy}px`;
    new MenuDraggable(menu);

    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab).classList.add('active');
        };
    });

    const features = [
        { id: 'sw_aimkill', label: 'AIMKILL', icon: 'fa-solid fa-crosshairs' },
        { id: 'sw_fly', label: 'FLY', icon: 'fa-solid fa-plane-up' },
        { id: 'sw_ghost', label: 'GHOST', icon: 'fa-solid fa-ghost' },
        { id: 'sw_teleport', label: 'TELE', icon: 'fa-solid fa-bolt' },
        { id: 'sw_fps', label: '120FPS', icon: 'fa-solid fa-gauge-high' },
        { id: 'sw_speed', label: 'SPEED', icon: 'fa-solid fa-person-running' }
    ];
    features.forEach(f => {
        const el = document.getElementById(f.id);
        if(el) new FloatingButton(f.id, f.label, f.icon, el);
    });

    document.addEventListener('keydown', e => {
        if(e.key === 'Insert' && isKeyVerified) {
            const isHidden = menu.style.display === 'none';
            toggleMenu(isHidden);
        }
    });
</script>
</body>
</html>
